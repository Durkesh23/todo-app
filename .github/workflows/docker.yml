name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_durkesh14 }}
          password: ${{ secrets.DOCKER_S.A.Mking }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_durkesh14 }}/todo-app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_durkesh14 }}/todo-app